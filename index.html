<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Portfolio | Shashi Kumar Singh</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<div id="header"></div>


<!-- HERO -->

<section id="home" class="hero">

<div class="hero-container">

<div class="hero-left">

<img id="profileImage" class="profile-image" alt="Profile Photo">

</div>

<div class="hero-right">

<h1 id="name"></h1>

<h2 id="title"></h2>

<p id="tagline"></p>

<div class="hero-buttons">

<a id="downloadResume" class="btn-primary" download>
Download Resume
</a>

<a id="linkedinBtn" class="btn-secondary" target="_blank">
LinkedIn
</a>

<a id="githubBtn" class="btn-secondary" target="_blank">
GitHub
</a>

</div>

</div>

</div>

</section>



<!-- SUMMARY -->

<section id="summary" class="section">

<h2 class="section-title">Professional Summary</h2>

<p id="summaryText" class="summary"></p>

</section>



<!-- CORE COMPETENCIES -->

<section id="competencies" class="section">

<h2 class="section-title">Core Competencies</h2>

<div id="competenciesContainer" class="competencies"></div>

</section>



<!-- SKILLS -->

<section id="skills" class="section">

<h2 class="section-title">Technical Skills</h2>

<div id="skillsContainer" class="skills-grid"></div>

</section>



<!-- EXPERIENCE -->

<section id="experience" class="section">

<h2 class="section-title">Professional Experience</h2>

<div id="experienceContainer"></div>

</section>



<!-- PROJECTS -->

<section id="projects" class="section">

<h2 class="section-title">Key Projects</h2>

<div id="projectsContainer" class="projects"></div>

</section>



<!-- CERTIFICATIONS -->

<section id="certifications" class="section">

<h2 class="section-title">Certifications</h2>

<ul id="certificationsContainer"></ul>

</section>



<!-- EDUCATION -->

<section id="education" class="section">

<h2 class="section-title">Education</h2>

<div id="educationContainer"></div>

</section>



<!-- ACHIEVEMENTS -->

<section id="achievements" class="section">

<h2 class="section-title">Achievements</h2>

<ul id="achievementsContainer"></ul>

</section>



<!-- FOOTER -->

<div id="footer"></div>



<script src="script.js"></script>

</body>

</html>
